name: Database Backup

on:
  workflow_dispatch:
  schedule:
    - cron: '30 16 * * *'

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:

      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17 gzip git

      - name: Dump database
        run: |
          set -e
          /usr/lib/postgresql/17/bin/pg_dump "${{ secrets.DATABASE_URL }}" > backup.sql
          gzip backup.sql
          mv backup.sql.gz backup_$(date +%F_%H-%M).sql.gz

      - name: Clone backup repository
        run: |
          git clone https://x-access-token:${{ secrets.BACKUP_REPO_TOKEN }}@github.com/${{ secrets.BACKUP_REPO }} backup-repo

      - name: Move backup
        run: |
          mkdir -p backup-repo/backups
          mv backup_*.sql.gz backup-repo/backups/

      - name: Delete backups older than 30 days
        run: |
          find backup-repo/backups -type f -mtime +30 -delete

      - name: Commit and push backup
        run: |
          cd backup-repo
          git config user.name "backup-bot"
          git config user.email "backup@github.com"
          git add .
          git commit -m "Database backup $(date +%F_%H-%M)" || echo "Nothing to commit"
          git push